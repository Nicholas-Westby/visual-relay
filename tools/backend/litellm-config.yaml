# LiteLLM proxy config for Visual Relay's local model backend.
#
# Served on http://127.0.0.1:4000 (see src/VisualRelay.Domain/ModelBackend.cs
# `BaseUrl`); answers the readiness probe at /health/readiness
# (`ModelBackend.ReadinessPath`). tools/backend/backend.sh start launches it.
#
# Clients (Swival) request a name; LiteLLM dispatches to the upstream provider.
# The `model_name`/alias set here is the SOURCE-OF-TRUTH that Visual Relay's
# generated swival.toml targets (src/VisualRelay.Core/Execution/SwivalProfileSession.cs
# `DefaultToml`) — keep the names in sync with that file.
#
# No secrets live here: every `api_key` reads from the environment via
# `os.environ/<KEY>`. Copy .env.example -> .env and fill in the provider keys you
# have; backend.sh sources .env at start. A request only fails if its specific
# provider key is unset — unused providers can stay blank, and the proxy still
# boots (readiness does not require any key).

model_list:
  # --- Moonshot (Kimi) -----------------------------------------------------
  - model_name: kimi-k2
    litellm_params:
      model: moonshot/kimi-k2.6
      api_key: os.environ/MOONSHOT_API_KEY
      # frontier override: kimi-k2 runs the Review stage, whose reasoning
      # legitimately takes up to ~410s before the first token (p99 331s, max 412s).
      # A high per-stream timeout keeps the router's global stream_timeout: 60 from
      # aborting a healthy slow Review; the frontier 660s watchdog is the backstop.
      stream_timeout: 600
      # NON-streaming calls ignore stream_timeout and previously had NO ceiling
      # here — two byte-0 wedges (18 and 30 min, 2026-06-10) sat on exactly that
      # path until manually severed. 720s > the 412s observed worst-case healthy
      # Review; the wedge-breaker, not a latency budget.
      timeout: 720
      # Connection: close on every model — litellm caches ONE httpx client per
      # PROVIDER for 3600s and pools upstream TCP (httpx defaults: keepalive 5s,
      # 20 conns). A wedged/half-dead pooled connection then hangs every request to
      # that provider (the rare byte-0 stall that no timeout/fallback caught and a
      # fresh swival process still hit), while other providers flow. A close header
      # forces a fresh TCP per request so a wedge can't be reused. (litellm 1.87.1
      # exposes no config to set httpx Limits/keepalive on the LLM client.)
      extra_headers:
        Connection: close

  # --- DeepSeek (first-party) ---------------------------------------------
  # Per-model timeout (s): DeepSeek intermittently hangs at byte 0 under sustained
  # load. 75s is well above its healthy first-output (≤46s max) but BELOW the
  # relay's per-tier first-output watchdog (cheap 90s / balanced 120s), so a hung
  # DeepSeek call hits this Timeout first → triggers the `fallbacks` below (to
  # kimi-k2 / HF, different providers) instead of the watchdog killing swival on
  # the same provider. (frontier=kimi-k2 has no such cap — its Review reasoning is
  # legitimately long.)
  - model_name: deepseek-v4-pro
    litellm_params:
      model: deepseek/deepseek-v4-pro
      api_key: os.environ/DEEPSEEK_API_KEY
      timeout: 75
      # Fresh TCP per request — see the kimi-k2 note above on litellm's per-provider
      # httpx client cache + pooled-connection wedge. DeepSeek backs BOTH the balanced
      # and cheap tiers, so it serves the most stages and is the provider that stalled
      # at byte 0 (installer-4, across cheap- and balanced-tier stages).
      extra_headers:
        Connection: close

  - model_name: deepseek-v4-flash
    litellm_params:
      model: deepseek/deepseek-v4-flash
      api_key: os.environ/DEEPSEEK_API_KEY
      timeout: 75
      # Fresh TCP per request — same DeepSeek pooled-connection wedge as -pro above.
      extra_headers:
        Connection: close

  # --- Hugging Face Inference Providers (one HF_TOKEN, many upstreams) -----
  # Path after `huggingface/` is `<provider>/<hf_org>/<hf_repo>`.
  - model_name: hf-qwen3-coder-next
    litellm_params:
      model: huggingface/novita/Qwen/Qwen3-Coder-480B-A35B-Instruct
      api_key: os.environ/HF_TOKEN
      # Fresh TCP per request — this is the cross-provider `fallback` alias, so it must
      # stay reliable; same pooled-connection reasoning as the kimi-k2 note above.
      extra_headers:
        Connection: close

  # Vision (multimodal) for the Relay describe pre-step; 30B is the cheaper
  # fallback target.
  - model_name: hf-qwen3-vl-235b
    litellm_params:
      model: huggingface/novita/Qwen/Qwen3-VL-235B-A22B-Instruct
      api_key: os.environ/HF_TOKEN

  - model_name: hf-qwen3-vl-30b
    litellm_params:
      model: huggingface/deepinfra/Qwen/Qwen3-VL-30B-A3B-Instruct
      api_key: os.environ/HF_TOKEN

  # --- Anthropic (Claude) — needs ANTHROPIC_API_KEY ------------------------
  # claude-opus-1m enables the 1M-context beta via extra_headers.
  - model_name: claude-opus-1m
    litellm_params:
      model: anthropic/claude-opus-4-1
      api_key: os.environ/ANTHROPIC_API_KEY
      extra_headers:
        anthropic-beta: "context-1m-2025-08-07"

  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  # --- OpenAI — needs OPENAI_API_KEY ---------------------------------------
  - model_name: gpt-5
    litellm_params:
      model: openai/gpt-5
      api_key: os.environ/OPENAI_API_KEY

# Tier aliases give clients a stable name that resolves to a concrete model.
# Re-target the right-hand side when a new winner shows up; clients keep asking
# for the tier name. These are the tier names Visual Relay's swival profiles use.
router_settings:
  # Per-stream first-byte/read timeout (s) for stream=True calls — the ONLY timeout
  # litellm honours for streaming (request_timeout and per-model litellm_params.timeout
  # are ignored for stream=True; see router.py _get_stream_timeout). On a byte-0 hang
  # litellm fails over to the `fallbacks` below after ~stream_timeout. This MUST be
  # below the relay's per-tier first-output watchdog (cheap 90s / balanced 120s), or
  # the watchdog kills swival before the fallback can fire — which is exactly why
  # failover never happened at 120s. 60s lets the fallback win for the fast tiers.
  # frontier (kimi-k2) overrides this via its own per-model stream_timeout, since its
  # Review reasoning legitimately takes up to ~410s before the first token.
  stream_timeout: 60
  model_group_alias:
    frontier: kimi-k2
    # The "-kimi" suffix on the balanced/cheap tiers is a Swival quirk (it only
    # preserves reasoning_content when the model id contains "kimi"); the tiers
    # themselves resolve to DeepSeek V4.
    balanced-kimi: deepseek-v4-pro
    cheap-kimi: deepseek-v4-flash
    vision: hf-qwen3-vl-235b
    claude: claude-opus-1m
    fallback: hf-qwen3-coder-next

  # Provider-diversified fallbacks: on 429/5xx/timeout/auth-error, cascade to
  # alternates on different providers. Keyed by the requested tier alias (LiteLLM
  # looks up fallbacks before resolving the alias).
  fallbacks:
    - frontier: [deepseek-v4-pro, hf-qwen3-coder-next, fallback]
    - balanced-kimi: [kimi-k2, deepseek-v4-flash, fallback]
    - cheap-kimi: [deepseek-v4-pro, fallback]
    - vision: [hf-qwen3-vl-30b, kimi-k2, fallback]
    - claude: [claude-sonnet]

litellm_settings:
  # Drop request params the upstream provider doesn't recognise instead of 400ing
  # — friendlier when swapping models with different feature sets.
  drop_params: true
  # Structured per-request JSON logs to stdout (backend.sh redirects into
  # .relay-scratch/litellm.log).
  json_logs: true
  # Per-request timeout (seconds). Without this, a stalled upstream stream (TCP
  # connected but no tokens) keeps the request open indefinitely, so the
  # `fallbacks` above never fire on "timeout" and the relay's 20-minute subagent
  # wall-clock is the only thing that ends it (observed: fix-timing-estimates
  # stage-6 stalled for the full 20 min). 300s is a generous ceiling over any
  # real generation while still failing a stalled call fast enough that swival's
  # retries + the provider fallbacks can recover within a stage's budget.
  request_timeout: 300
