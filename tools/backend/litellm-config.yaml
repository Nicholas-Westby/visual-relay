# LiteLLM proxy config for Visual Relay's local model backend.
#
# This proxy is served on http://127.0.0.1:4000 (see
# src/VisualRelay.Domain/ModelBackend.cs `BaseUrl`) and answers the readiness
# probe at /health/readiness (`ModelBackend.ReadinessPath`).
#
# `model_name` entries are the SOURCE-OF-TRUTH aliases that Visual Relay's
# generated swival.toml targets (see
# src/VisualRelay.Core/Execution/SwivalProfileSession.cs `DefaultToml`). Keep
# these names in sync with that file.
#
# No secrets live here: every `api_key` reads from the environment via
# `os.environ/<KEY>`. Copy .env.example -> .env and fill in the provider keys
# you actually need. A request only fails if its specific provider key is unset;
# unused providers can stay blank.
model_list:
  # --- Moonshot (Kimi) -----------------------------------------------------
  - model_name: cheap-kimi
    litellm_params:
      model: moonshot/moonshot-v1-8k
      api_key: os.environ/MOONSHOT_API_KEY

  - model_name: balanced-kimi
    litellm_params:
      model: moonshot/moonshot-v1-32k
      api_key: os.environ/MOONSHOT_API_KEY

  - model_name: kimi-k2
    litellm_params:
      model: moonshot/kimi-k2-0711-preview
      api_key: os.environ/MOONSHOT_API_KEY

  # --- Anthropic (Claude) --------------------------------------------------
  - model_name: claude
    litellm_params:
      model: anthropic/claude-3-7-sonnet-latest
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-3-7-sonnet-latest
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-opus-1m
    litellm_params:
      model: anthropic/claude-opus-4-1
      api_key: os.environ/ANTHROPIC_API_KEY

  # --- OpenAI --------------------------------------------------------------
  - model_name: gpt-5
    litellm_params:
      model: openai/gpt-5
      api_key: os.environ/OPENAI_API_KEY

  # --- Frontier / vision (Anthropic-backed defaults) -----------------------
  - model_name: frontier
    litellm_params:
      model: anthropic/claude-opus-4-1
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: vision
    litellm_params:
      model: anthropic/claude-3-7-sonnet-latest
      api_key: os.environ/ANTHROPIC_API_KEY

  # --- Together (Qwen3 Coder) ----------------------------------------------
  - model_name: hf-qwen3-coder-next
    litellm_params:
      model: together_ai/Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8
      api_key: os.environ/TOGETHER_API_KEY

# Loopback binding (--host 127.0.0.1) and the port are set by the start script
# (tools/backend/backend.sh), which also polls the /health/readiness endpoint
# LiteLLM exposes. No general_settings are needed here.
